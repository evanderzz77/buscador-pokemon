<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Buscador de Pokémon</h1>
    </header>

    <main>
        <section id="buscador">
            <div id="barra-pesquisa">
                <form id="busca">
                    <input type="text" id="input-busca">
                    <button type="submit">Buscar</button>
                </form>
            </div>
        </section>

        <section id="resultados" hidden>
            <div id="card-pokemon">
                <img src="" alt="" id="img">
                <p id="num-pokedex"></p>
                <p id="nome"></p>
                <p id="tipos"></p>
                <p id="habilidades"></p>
                <select id="games">
                </select>
                <p id="encontros"></p>
            </div>
        </section>

        <section id="erros" hidden>
            <div id="card-erros">
                <p id="erro"></p>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
