<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Pokémon</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1 class="titulo">Buscador de Pokémon</h1>
    </header>

    <main>
        <section id="buscador">
            <form id="busca" role="search">
                <label for="input-busca">Nome/número do pokémon:</label>
                <input type="text" id="input-busca" name="busca">
                <button type="submit">Buscar</button>
            </form>
        </section>

        <section id="erros" hidden aria-live="polite">
            <p id="erro"></p>
        </section>

        <section id="resultados" hidden>
            <article class="card-pokemon">
                <img src="" alt="" id="img">
                <h2 id="nome"></h2>
                <p id="num-pokedex"></p>
                <p id="tipos"></p>
                <p id="habilidades"></p>
                <select id="games">
                </select>
                <p id="encontros"></p>
            </article>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
